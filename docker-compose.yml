services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_local
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
